<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Painel Admin - Base de Conhecimento</title>
  <link rel="stylesheet" href="style.css">
</head>
<body style="padding: 40px; display: block; overflow-y: auto;">

  <h1>Painel Administrativo - UltraTelecom</h1>
  <p><a href="index.html">← Voltar para o Chat</a></p>
  <br>

  <div style="background: white; padding: 20px; border-radius: 8px; max-width: 600px; border: 1px solid #ddd;">
    <h3>Adicionar Novo Documento</h3>
    <br>
    <form id="uploadForm">
      <label>Categoria:</label><br>
      <select id="category" style="width: 100%; padding: 8px; margin: 8px 0;">
        <option>Suporte Técnico</option>
        <option>Comercial</option>
        <option>Financeiro</option>
        <option>ONUs</option>
        <option>OLTs</option>
        <option>Roteadores</option>
        <option>Redes</option>
      </select>
      <br><br>
      <input type="file" id="fileInput" required><br><br>
      <button type="button" class="btn-primary" onclick="uploadDoc()">Cadastrar Documento</button>
    </form>
  </div>

  <br>
  <h3>Documentos Cadastrados</h3>
  <ul id="docList" style="margin-top: 10px; padding-left: 20px;"></ul>

  <script>
    async function loadDocs() {
      const res = await fetch('http://localhost:8000/api/documents');
      const data = await res.json();
      const list = document.getElementById('docList');
      list.innerHTML = data.documents.map(d => `<li>${d}</li>`).join('') || 'Nenhum documento cadastrado.';
    }

    async function uploadDoc() {
      const category = document.getElementById('category').value;
      const fileInput = document.getElementById('fileInput');
      if (!fileInput.files[0]) return alert("Selecione um arquivo!");

      const formData = new FormData();
      formData.append('category', category);
      formData.append('file', fileInput.files[0]);

      await fetch('http://localhost:8000/api/documents/upload', { method: 'POST', body: formData });
      alert("Documento salvo!");
      loadDocs();
    }

    loadDocs();
  </script>
</body>
</html>
