<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Assistente UltraTelecom</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>

  <div id="authContainer" class="auth-container">
    <div class="auth-box">
      <h2 id="authTitle">Login - UltraTelecom</h2>
      <p id="authSubtitle">Entre para acessar suas conversas salvas.</p>
      
      <input type="email" id="authEmail" placeholder="Seu e-mail">
      <input type="password" id="authPassword" placeholder="Sua senha">
      
      <input type="password" id="authAdminSecret" placeholder="Chave Secreta Admin (Opcional)" style="display: none;">

      <button id="authBtn" onclick="handleAuth()">Entrar</button>

      <p class="toggle-auth">
        <span id="toggleText">Não tem uma conta?</span>
        <a href="#" onclick="toggleAuthMode(event)" id="toggleLink">Cadastre-se</a>
      </p>
      <p id="authError" class="error-msg"></p>
    </div>
  </div>

  <div id="appContainer" class="app-container" style="display: none;">
    <div class="sidebar">
      <h2>UltraTelecom IA</h2>
      <button class="btn-new" onclick="startNewChat()">+ Nova Conversa</button>
      
      <div class="history-title">Sua conversas</div>
      <div id="chatHistory" class="history-list">
        </div>

      <div class="spacer"></div>
      <a href="admin.html" id="adminLink" class="admin-link" style="display: none;">⚙️ Painel Admin</a>
      <button class="btn-logout" onclick="logout()">Sair</button>
    </div>

    <div class="main-chat">
      <div class="chat-header">
        <h3>Assistente Virtual Interno</h3>
        <span id="userBadge" class="user-badge"></span>
      </div>

      <div id="chatBox" class="chat-box">
        <div class="message bot">
          Olá! Como posso te ajudar hoje com as documentações da UltraTelecom?
        </div>
      </div>

      <div class="input-container">
        <input type="text" id="userInput" placeholder="Digite sua dúvida..." onkeydown="if(event.key==='Enter') sendMsg()">
        <button onclick="sendMsg()">Enviar</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
